<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的常用連結導航</title>
    <style>
        /* 基礎樣式重設o */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 內容容器 */
        .container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            overflow: hidden; /* 確保圖片圓角不會超出容器 */
        }

        /* 頂部大橫幅圖片樣式 */
        .banner-pic {
            width: 100%;          /* 寬度 100% 撐滿容器 */
            height: 200px;         /* 高度固定 200 像素，可依需求自行調整 */
            object-fit: cover;     /* 裁切圖片使其填滿不變形 */
            display: block;
        }

        /* 內容文字區塊 */
        .content-body {
            padding: 24px 20px 30px 20px; /* 內距：上 右 下 左 */
        }

        /* 大標題 */
        h1 {
            font-size: 24px;
            color: #333333;
            margin-bottom: 8px;
        }

        /* 副標題說明 */
        .description {
            font-size: 14px;
            color: #666666;
            margin-bottom: 30px;
        }

        /* 連結按鈕群組 */
        .link-group {
            display: flex;
            flex-direction: column;
            gap: 16px; /* 按鈕之間的間距 */
        }

        /* 單個連結按鈕樣式 */
        .link-button {
            display: block;
            padding: 14px;
            background-color: #4f46e5; /* 按鈕顏色 */
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(79, 70, 229, 0.1);
        }

        /* 滑鼠懸停與點擊效果 */
        .link-button:hover {
            background-color: #4338ca;
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(79, 70, 229, 0.2);
        }

        .link-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頂部大橫幅圖片 -->
        <img src="head.jpeg" alt="頂部橫幅" class="banner-pic">
            
        <!-- 文字與按鈕內容區塊 -->
        <div class="content-body">
            <!-- 這裡可以改成你的名字或品牌名 -->
            <h1>歡迎來到我的導航頁</h1>
            <p class="description">請點擊下方按鈕前往對應的網站</p>

            <div class="link-group">
                <a href="https://www.google.com" target="_blank" class="link-button">前往 Google 搜尋</a>
                <a href="https://www.youtube.com" target="_blank" class="link-button">觀看 YouTube 影片</a>
                <a href="https://www.facebook.com" target="_blank" class="link-button">關注我的 Facebook</a>
                <a href="https://github.com" target="_blank" class="link-button">瀏覽我的 GitHub</a>
            </div>
        </div>
    </div>

</body>
</html>
