<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>包囍饅頭台中區</title>
    <style>
        /* 基礎樣式重設 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* 內容容器 */
        .container {
            width: 100%;
            max-width: 480px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
            text-align: center;
            overflow: hidden; /* 確保圖片頂部有圓角 */
        }

        /* 內容文字區塊 */
        .content-body {
            padding: 24px 20px 30px 20px;
        }

        /* 網頁大標題 */
        h1 {
            font-size: 24px;
            color: #333333;
            margin-bottom: 8px;
        }

        /* 網頁副標題說明 */
        .description {
            font-size: 14px;
            color: #666666;
            margin-bottom: 30px;
        }

        /* 連結按鈕群組 */
        .link-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 單個連結按鈕樣式 */
        .link-button {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 12px 16px;
            background-color: #06C755; /* LINE 綠色 */
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            transition: all 0.2s ease;
            box-shadow: 0 2px 4px rgba(6, 199, 85, 0.15);
        }

        /* 按鈕內的主標題 */
        .btn-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        /* 按鈕內的副標題 */
        .btn-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.85); /* 稍微透明的白色，凸顯層次 */
        }

        /* 滑鼠懸停與點擊效果 */
        .link-button:hover {
            background-color: #05b34c; /* 深一點的綠色 */
            transform: translateY(-2px);
            box-shadow: 0 4px 8px rgba(6, 199, 85, 0.3);
        }

        .link-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="container">
        <!-- 頂部大橫幅圖片 -->
        <img src="head.jpeg" alt="頂部橫幅" style="width: 100% !important; height: 200px !important; object-fit: cover !important; border-radius: 0px !important; display: block !important;">
            
        <div class="content-body">
            <!-- 網頁標題，有需要可以自行修改中文字 -->
            <h1>歡迎來到我的導航頁</h1>
            <p class="description">請點擊下方按鈕前往對應的網站</p>

            <div class="link-group">
                <!-- 按鈕 1 -->
                <a href="https://lin.ee/Zkzv2v6" target="_blank" class="link-button">
                    <span class="btn-title">台中區官方帳號</span>
                    <span class="btn-subtitle">提供冷凍宅配服務</span>
                </a>

                <!-- 按鈕 2 -->
                <a href="https://line.me/ti/g2/7rYGKZCOPvNntcCrC4aqaj57AKWzF2Bjyo88mw?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" class="link-button">
                    <span class="btn-title">台中五權店社群</span>
                    <span class="btn-subtitle">加入社群獲取最新資訊</span>
                </a>

                <!-- 按鈕 3 -->
                <a href="https://line.me/ti/g2/NesQ6EYzrnFFq9fOow_7pLP_Xfby9rw0RPAkZw?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" class="link-button">
                    <span class="btn-title">台中漢口店社群</span>
                    <span class="btn-subtitle">加入社群獲取最新資訊</span>
                </a>

                <!-- 按鈕 4 -->
                <a href="https://line.me/ti/g2/73YcCsTDjJc8SZQssejOj5Bs5IB4JQd1VgtQxg?utm_source=invitation&utm_medium=link_copy&utm_campaign=default" target="_blank" class="link-button">
                    <span class="btn-title">台中大慶夜市社群</span>
                    <span class="btn-subtitle">加入社群獲取最新資訊</span>
                </a>
            </div>
        </div>
    </div>

</body>
</html>
